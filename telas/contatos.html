<!DOCTYPE html>

     <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css" rel="stylesheet">

<body>
    <header>
        <div class="divHeader">
            <img src="../img/logo.png" title="Pizzaria Legal" class="logo"/>

                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="produtos.html">Produtos</a></li>
                    <li>Contato</li>
                </ul>
            </nav>
        </div>
    </header>

     <!--Data-->
            <p class="dataAtual"><script>
                data = new Date

                //Dia da semana
                diaSemana = new Array('Domingo','Segunda-Feira','Terça-Feira','Quarta-Feira','Quinta-Feira','Sexta-Feira','Sábado')

                mes = new Array('Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro')

                document.write(diaSemana[data.getDay()] + ', ' + data.getDate() + ' de ' + mes[data.getMonth()] + ' de ' + data.getFullYear())
            </script></p>

    <main>
        <ul class="contatos-titulo">
            <li class="contatos-item"> Contatos</li>
        </ul>
        <div id="formRetorno" class="divRetorno">
            <p id="textoRetorno" class="texto-contatos"></p>
        </div>
        <div id="formulario">
            <p class="texto-contatos">
                Será uma alegria te atender!
                <br><br>
                Você pode nos encontrar no Instagram, no WhatsApp ou preencher o formulário abaixo.
            </p>
            <form id="frmContato">
                <fieldset>
                    <legend>Dados Pessoais</legend>
                    <label>Nome e sobrenome</label>
                    <input type="text" id="nomesobrenome" name="" class="input-padrao" required>

                    <label>E-mail</label>
                    <input type="email" id="email" name="" class="input-padrao" placeholder="seuemail@dominio.com">

                    <label>Telefone</label>
                    <input type="tel" id="telefone" name="" class="input-padrao" placeholder="(XX) XXXXX-XXXX ">

                    <label>Mensagem</label>
                    <textarea cols="70" rows="10" id="mensagem" class="input-padrao" required></textarea>

                    <label>Como prefere o nosso contato?
                        <select>
                            <option>Seleciona</option>
                            <option>Dúvida</option>
                            <option>Sugestão</option>
                            <option>Elogio</option>
                            <option>Reclamação</option>
                        </select>
                    </label>
                    <br>
                </fieldset>

                <label><input type="checkbox" class="chk" > Gostaria de receber nossas novidades por e-mail?</label>

                <input type="submit" id="enviar" value="Enviar formulário" class="enviar">
            </form>
        </div>
    </main>

     <footer>
            <img src="../img/logo.png" title="Pizzaria Legal" class="logo_footer"/>

                <a class="whatsapp-link" href="https://web.whatsapp.com/" target="_blank">
                    <i class="fa fa-whatsapp"></i>(11) 20150-8149</a>
                <a class="instagram-link" href="https://www.instagram.com/" target="_blank">
                    <i class="fa fa-instagram"></i>@pizzarialegal_</a> 
            </p>
        </footer>
